name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with 100% coverage
        run: pytest --cov=budget --cov-fail-under=100

      - name: Check cyclomatic complexity with radon
        run: radon cc budget tests

      - name: Enforce cyclomatic complexity B or better with xenon
        run: xenon --max-absolute B --max-average B --max-modules B budget tests

      - name: Run flake8
        run: flake8 budget tests
